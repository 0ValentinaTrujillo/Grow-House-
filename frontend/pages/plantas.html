<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grow House | Plantas</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/output.css"> 
    <link rel="stylesheet" href="../styles/styles.css">  
    <style>
        :root {
            --primary-green: #207719;
            --hover-green: #165a12;
        }

        body { font-family: 'Poppins', sans-serif; }

        /* Estilos purgados: Solo lo necesario para el catálogo */
        .product-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .product-card:hover {
            transform: translateY(-8px);
            border-color: var(--primary-green);
            box-shadow: 0 20px 25px -5px rgba(32, 119, 25, 0.1);
        }

        .search-bar-container {
            border: 1px solid #cbd5e1;
            transition: border-color 0.3s;
        }
        .search-bar-container:focus-within {
            border-color: var(--primary-green);
        }

        .btn-action {
            background-color: var(--primary-green);
            color: white;
            transition: background 0.3s;
        }
        .btn-action:hover {
            background-color: var(--hover-green);
        }
    </style>
</head>
<body class="bg-gray-50 antialiased">

    <header class="bg-white shadow-sm sticky top-0 z-50">
        <nav class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <img src="../assets/images/logo.png" alt="Logo" class="w-10 h-10 rounded-full">
                <a href="index.html" class="text-2xl font-bold text-green-900">Grow House</a>
            </div>

            <div class="hidden md:flex space-x-8 font-medium text-gray-600">
                <a href="index.html" class="hover:text-green-700">Inicio</a>
                <a href="productos.html" class="text-green-700">Productos</a>
                <a href="index.html#contacto" class="hover:text-green-700">Soporte</a>
            </div>

            <div class="flex items-center">
                <a href="carrito.html" class="text-gray-600 hover:text-green-700 relative">
                    <i class="fas fa-shopping-basket text-xl"></i>
                    <span id="cart-counter" class="absolute -top-2 -right-2 bg-green-600 text-white text-xs rounded-full px-1.5 hidden">0</span>
                </a>
            </div>
        </nav>
    </header>

    <main class="container mx-auto px-6 py-12">
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-12 gap-6">
            <div>
                <h1 class="text-4xl font-bold text-gray-900">Plantas</h1>
                <p class="text-gray-500 mt-2">Selección profesional para tu cultivo.</p>
            </div>

            <div class="search-bar-container flex items-center bg-white rounded-full px-6 py-2 w-full md:w-96 shadow-sm">
                <input type="text" id="search-input" placeholder="Buscar en plantas..." 
                       class="w-full bg-transparent focus:outline-none text-gray-700 text-sm">
                <button onclick="ejecutarBusqueda()"><i class="fas fa-search text-gray-400"></i></button>
            </div>
        </div>

        <div id="category-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            <div class="col-span-full text-center py-20">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-green-800 mx-auto"></div>
                <p class="mt-4 text-gray-500">Sincronizando catálogo...</p>
            </div>
        </div>

        <div id="pagination-container" class="mt-16 flex justify-center"></div>
    </main>

    <footer class="bg-white border-t border-gray-200 py-10 mt-20">
        <div class="container mx-auto px-6 text-center text-gray-400 text-sm">
            <p>© 2026 Grow House | Ingeniería en Sistemas - Módulo de Productos</p>
        </div>
    </footer>

    <script src="../scripts/config.js"></script>
    <script src="../scripts/productos-api.js"></script>
    <script>
        const CATEGORY = 'plantas';
        const LIMIT = 12;
        let currentPage = 1;

        async function cargarCategoria(page = 1, search = '') {
            const grid = document.getElementById('category-grid');
            
            try {
                // Solo la función de IA que genera detalles/cards se mantiene activa a través de productos-api.js
                const response = await fetch(`${window.GROW_HOUSE_API}/products?category=${CATEGORY}&status=active&limit=${LIMIT}&page=${page}&search=${encodeURIComponent(search)}`);
                const json = await response.json();
                
                grid.innerHTML = '';
                
                if (json.data && json.data.length > 0) {
                    json.data.forEach(p => {
                        // createProductCard es el único componente que genera detalles dinámicos
                        grid.appendChild(createProductCard(p));
                    });
                    // renderPagination() debería estar en productos-api o main.js para reutilizar lógica
                } else {
                    grid.innerHTML = '<div class="col-span-full text-center py-10 text-gray-400">No se hallaron resultados en esta categoría.</div>';
                }
            } catch (error) {
                console.error("Error de carga:", error);
                grid.innerHTML = '<div class="col-span-full text-center text-red-500">Error al conectar con el sistema de inventario.</div>';
            }
        }

        function ejecutarBusqueda() {
            const query = document.getElementById('search-input').value;
            cargarCategoria(1, query);
        }

        document.addEventListener('DOMContentLoaded', () => cargarCategoria(1));
    </script>
</body>
</html>
