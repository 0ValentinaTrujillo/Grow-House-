<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grow House | Iniciar Sesión</title>
    <link rel="icon" href="data:,">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/output.css">
    <link rel="stylesheet" href="../styles/styles.css">
    <style>
        html, body { box-sizing: border-box; overflow-x: hidden; }
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background-image: url("../assets/images/fondo-paginacion.jpg");
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .btn-primary {
            background: linear-gradient(to right, #166534, #016622);
            transition: all 0.2s;
        }
        .btn-primary:hover { transform: scale(1.02); }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header style="background: rgba(32,119,25,0.92); backdrop-filter: blur(8px);">
        <nav style="max-width:1280px; margin:0 auto; padding: 0.75rem 1.5rem; display:flex; align-items:center; justify-content:space-between;">
            <div style="display:flex; align-items:center; gap:0.75rem;">
                <img src="../assets/images/Logo-blanco.png" alt="Logo" style="width:2.5rem; height:2.5rem; border-radius:50%; object-fit:cover;">
                <a href="index.html" style="color:white; font-weight:700; font-size:1.25rem; text-decoration:none;">Grow House</a>
            </div>
            <a href="register.html" style="color:white; font-size:0.875rem; opacity:0.85; text-decoration:none; transition:opacity 0.2s;"
               onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.85'">
                ¿No tienes cuenta? <strong>Regístrate</strong>
            </a>
        </nav>
    </header>

    <!-- CONTENIDO PRINCIPAL -->
    <main style="flex:1; display:flex; align-items:center; justify-content:center; padding: 2rem 1rem;">
        <div style="width:100%; max-width:28rem;">

            <!-- Card login -->
            <div class="bg-white rounded-2xl shadow-2xl border border-gray-100" style="padding: clamp(1.5rem, 5vw, 2.5rem);">

                <!-- Título -->
                <div class="text-center" style="margin-bottom:2rem;">
                    <div style="width:3.5rem; height:3.5rem; background:linear-gradient(135deg,#166534,#46d560); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 1rem;">
                        <svg style="width:1.5rem;height:1.5rem;color:white;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                        </svg>
                    </div>
                    <h1 class="text-3xl font-bold text-gray-900" style="margin-bottom:0.25rem;">¡Bienvenido!</h1>
                    <p class="text-gray-500" style="font-size:0.9rem;">Inicia sesión en tu cuenta de Grow House</p>
                </div>

                <!-- Formulario -->
                <form id="login-form" class="space-y-4">

                    <!-- Email -->
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700" style="margin-bottom:0.5rem;">
                            Correo electrónico
                        </label>
                        <input type="email" id="email" name="email" required
                            placeholder="tu@email.com"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-600 focus:border-green-600 transition-all duration-200 text-gray-900">
                        <p id="email-error" class="text-red-500 text-sm mt-1 hidden"></p>
                    </div>

                    <!-- Contraseña -->
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700" style="margin-bottom:0.5rem;">
                            Contraseña
                        </label>
                        <div class="relative">
                            <input
                                type="password"
                                id="password"
                                name="password"
                                required
                                placeholder="••••••••"
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-600 focus:border-green-600 transition-all duration-200 pr-12 text-gray-900"
                            >
                            <button
                                type="button"
                                id="toggle-password"
                                class="absolute right-3 top-1/2 text-gray-400 hover:text-gray-600 transition-colors"
                                style="transform:translateY(-50%);"
                            >
                                <svg id="eye-icon-open" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                                </svg>
                                <svg id="eye-icon-closed" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
                                </svg>
                            </button>
                        </div>
                        <p id="password-error" class="text-red-500 text-sm mt-1 hidden"></p>
                    </div>

                    <!-- Recordarme / Olvidé contraseña -->
                    <div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:0.5rem;">
                        <label style="display:flex; align-items:center; cursor:pointer; gap:0.5rem;">
                            <input type="checkbox" id="remember-me"
                                style="width:1rem; height:1rem; accent-color:#166534;">
                            <span style="font-size:0.875rem; color:#374151;">Recordarme</span>
                        </label>
                        <a href="recoverpassword.html"
                            style="font-size:0.875rem; color:#166534; font-weight:500; text-decoration:none; transition:color 0.2s;"
                            onmouseover="this.style.color='#14532d'" onmouseout="this.style.color='#166534'">
                            ¿Olvidaste tu contraseña?
                        </a>
                    </div>

                    <!-- Error general -->
                    <div id="login-error" class="hidden bg-red-50 border border-red-200 text-red-800 px-4 py-3 rounded-lg">
                        <div class="flex items-center">
                            <svg class="w-5 h-5 mr-2 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                            <span id="login-error-message"></span>
                        </div>
                    </div>

                    <!-- Botón submit -->
                    <button id="login-btn" type="submit"
                        class="btn-primary w-full text-white py-3 px-6 rounded-lg font-semibold flex items-center justify-content-center"
                        style="display:flex; align-items:center; justify-content:center; gap:0.5rem;">
                        <svg style="width:1.25rem; height:1.25rem; flex-shrink:0;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/>
                        </svg>
                        Iniciar Sesión
                    </button>
                </form>

                <!-- Divider -->
                <div class="relative" style="margin: 1.5rem 0;">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-200"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-4 bg-white text-gray-400">O continúa con</span>
                    </div>
                </div>

                <!-- Google One-Tap -->
                <div id="g_id_onload"
                    data-client_id="873365892028-gpklspl23p04fidlkvbva2mp3u2o2sbi.apps.googleusercontent.com"
                    data-callback="handleCredentialResponse"
                    data-auto_prompt="false">
                </div>
                <div class="g_id_signin"
                    data-type="standard"
                    data-size="large"
                    data-theme="outline"
                    data-text="signin_with"
                    data-shape="rectangular"
                    data-logo_alignment="left">
                </div>

                <!-- Registro -->
                <p style="margin-top:1.5rem; text-align:center; color:#6b7280; font-size:0.9rem;">
                    ¿No tienes cuenta?
                    <a href="register.html" style="color:#166534; font-weight:600; text-decoration:none;"
                        onmouseover="this.style.color='#14532d'" onmouseout="this.style.color='#166534'">
                        Regístrate aquí
                    </a>
                </p>
            </div>

            <!-- Seguridad -->
            <p style="text-align:center; color:white; font-size:0.8rem; margin-top:1rem; opacity:0.9; text-shadow:0 1px 3px rgba(0,0,0,0.3);">
                <svg class="w-4 h-4 inline mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="vertical-align:middle;">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                </svg>
                Tus datos están protegidos con encriptación de nivel empresarial
            </p>
        </div>
    </main>

    <!-- Scripts -->
    <script src="../scripts/config.js"></script>
    <script src="../scripts/auth-api.js"></script>
    <script src="../scripts/session.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <script>
        console.log('🔐 Inicializando login.html');

        if (authAPI.isAuthenticated()) {
            console.log('✅ Usuario ya está logueado, redirigiendo...');
            showAuthNotification('Ya tienes una sesión activa', 'info');
            setTimeout(() => { window.location.href = 'index.html'; }, 1000);
        }

        // Toggle password
        const togglePasswordBtn = document.getElementById('toggle-password');
        const passwordInput = document.getElementById('password');
        const eyeIconOpen = document.getElementById('eye-icon-open');
        const eyeIconClosed = document.getElementById('eye-icon-closed');

        togglePasswordBtn.addEventListener('click', () => {
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIconOpen.classList.add('hidden');
                eyeIconClosed.classList.remove('hidden');
            } else {
                passwordInput.type = 'password';
                eyeIconOpen.classList.remove('hidden');
                eyeIconClosed.classList.add('hidden');
            }
        });

        // Validación en tiempo real
        const emailInput = document.getElementById('email');

        emailInput.addEventListener('blur', () => {
            const email = emailInput.value.trim();
            if (!email) showFieldError('email', 'El correo es obligatorio');
            else if (!isValidEmail(email)) showFieldError('email', 'Ingresa un correo válido');
            else hideFieldError('email');
        });

        passwordInput.addEventListener('blur', () => {
            const password = passwordInput.value;
            if (!password) showFieldError('password', 'La contraseña es obligatoria');
            else if (password.length < 8) showFieldError('password', 'La contraseña debe tener al menos 8 caracteres');
            else hideFieldError('password');
        });

        emailInput.addEventListener('input', () => { if (emailInput.classList.contains('input-error')) hideFieldError('email'); });
        passwordInput.addEventListener('input', () => { if (passwordInput.classList.contains('input-error')) hideFieldError('password'); });

        // Formulario
        const loginForm = document.getElementById('login-form');
        const loginBtn = document.getElementById('login-btn');
        const loginError = document.getElementById('login-error');
        const loginErrorMessage = document.getElementById('login-error-message');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideAllErrors();

            const email = emailInput.value.trim();
            const password = passwordInput.value;
            let hasErrors = false;

            if (!email) { showFieldError('email', 'El correo es obligatorio'); hasErrors = true; }
            else if (!isValidEmail(email)) { showFieldError('email', 'Ingresa un correo válido'); hasErrors = true; }

            if (!password) { showFieldError('password', 'La contraseña es obligatoria'); hasErrors = true; }
            else if (password.length < 8) { showFieldError('password', 'La contraseña debe tener al menos 8 caracteres'); hasErrors = true; }

            if (hasErrors) return;

            const originalBtnText = loginBtn.innerHTML;
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<svg class="w-5 h-5 animate-spin" style="display:inline;margin-right:0.5rem;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>Iniciando sesión...';

            try {
                const result = await authAPI.login(email, password);
                if (result.success) {
                    showAuthNotification('¡Bienvenido de vuelta!', 'success');
                    setTimeout(() => {
                        const redirectUrl = new URLSearchParams(window.location.search).get('redirect') || 'index.html';
                        window.location.href = redirectUrl;
                    }, 1500);
                } else {
                    showGeneralError(result.error);
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = originalBtnText;
                }
            } catch (error) {
                showGeneralError('Error de conexión. Verifica tu conexión a internet.');
                loginBtn.disabled = false;
                loginBtn.innerHTML = originalBtnText;
            }
        });

        function isValidEmail(email) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email); }

        function showFieldError(field, message) {
            const input = document.getElementById(field);
            const errorEl = document.getElementById(`${field}-error`);
            input.classList.add('input-error', 'border-red-500');
            input.classList.remove('border-gray-300');
            errorEl.textContent = message;
            errorEl.classList.remove('hidden');
        }

        function hideFieldError(field) {
            const input = document.getElementById(field);
            const errorEl = document.getElementById(`${field}-error`);
            input.classList.remove('input-error', 'border-red-500');
            input.classList.add('border-gray-300');
            errorEl.classList.add('hidden');
        }

        function showGeneralError(message) {
            loginErrorMessage.textContent = message;
            loginError.classList.remove('hidden');
            setTimeout(() => { loginError.classList.add('hidden'); }, 5000);
        }

        function hideAllErrors() {
            hideFieldError('email');
            hideFieldError('password');
            loginError.classList.add('hidden');
        }

        console.log('✅ login.html inicializado correctamente');
    </script>

    <script>
        async function handleCredentialResponse(response) {
            try {
                const res = await fetch(window.GROW_HOUSE_API + "/auth/google-login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ token: response.credential })
                });
                const data = await res.json();
                if (!data.success) { showAuthNotification(data.message || 'Error al iniciar sesión con Google', 'error'); return; }
                authAPI.saveAuthData(data.token, data.user);
                const msg = data.isNewUser ? `¡Bienvenido a Grow House, ${data.user.firstName}!` : `¡Bienvenido de nuevo, ${data.user.firstName}!`;
                showAuthNotification(msg, 'success');
                setTimeout(() => {
                    const redirect = new URLSearchParams(window.location.search).get('redirect');
                    if (redirect) {
                        window.location.href = redirect;
                    } else if (data.isNewUser) {
                        window.location.href = 'recomendaciones.html';
                    } else {
                        window.location.href = 'index.html';
                    }
                }, 1000);
            } catch (err) {
                console.error("Error Google Login:", err);
                showAuthNotification('No se pudo conectar con el servidor', 'error');
            }
        }
    </script>
</body>
</html>
