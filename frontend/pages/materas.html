<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grow House | Catálogo de Materas</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/output.css"> 
    <link rel="stylesheet" href="../styles/styles.css">  
    <style>
        :root {
            --primary-green: #207719;
            --dark-green: #165a12;
            --bg-light: #f8fafc;
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: var(--bg-light);
        }
        
        /* Card de Producto Unificada */
        .product-card {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 24px rgba(32, 119, 25, 0.12);
            border-color: var(--primary-green);
        }

        .product-image {
            width: 100%;
            height: 240px;
            object-fit: cover;
            background-color: #f1f5f9;
        }

        /* Botón de acción principal */
        .btn-view {
            background-color: var(--primary-green);
            color: white;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 8px;
            transition: background 0.2s ease;
            width: 100%;
            text-align: center;
            display: block;
        }

        .btn-view:hover {
            background-color: var(--dark-green);
        }

        /* Buscador optimizado */
        .search-bar {
            border: 2px solid #e2e8f0;
            transition: all 0.3s ease;
        }

        .search-bar:focus-within {
            border-color: var(--primary-green);
            box-shadow: 0 0 0 3px rgba(32, 119, 25, 0.1);
        }
    </style>
</head>
<body class="antialiased">

    <header class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <nav class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <img src="../assets/images/logo.png" alt="Grow House Logo" class="w-10 h-10">
                <a href="index.html" class="text-2xl font-bold text-green-900 tracking-tight">Grow House</a>
            </div>

            <div class="hidden md:flex space-x-8">
                <a href="index.html" class="text-gray-700 hover:text-green-800 font-medium transition relative group">
                    Inicio
                    <span class="absolute bottom-0 left-0 w-0 h-0.5 bg-green-800 transition-all duration-300 group-hover:w-full"></span>
                </a>
                <a href="productos.html" class="text-green-800 font-semibold relative group">
                    Productos
                    <span class="absolute bottom-0 left-0 w-full h-0.5 bg-green-800"></span>
                </a>
                <a href="index.html#categorias" class="text-gray-700 hover:text-green-800 font-medium transition relative group">
                    Categorías
                    <span class="absolute bottom-0 left-0 w-0 h-0.5 bg-green-800 transition-all duration-300 group-hover:w-full"></span>
                </a>
                <a href="#contacto" class="text-gray-700 hover:text-green-800 font-medium transition relative group">
                    Contacto
                    <span class="absolute bottom-0 left-0 w-0 h-0.5 bg-green-800 transition-all duration-300 group-hover:w-full"></span>
                </a>
            </div>

        </nav>
    </header>

    <main class="container mx-auto px-6 py-10">
        <header class="flex flex-col md:flex-row md:items-end justify-between mb-12 border-b border-gray-200 pb-6">
            <div>
                <nav class="text-xs text-gray-400 mb-2 uppercase tracking-widest">Productos / Catálogo</nav>
                <h1 class="text-4xl font-extrabold text-gray-900">Materas Profesionales</h1>
            </div>
            
            <div class="search-bar flex items-center bg-white rounded-xl px-4 py-3 w-full md:w-80 mt-6 md:mt-0">
                <input type="text" id="search-input" placeholder="Filtrar por tamaño o material..." class="w-full outline-none text-sm text-gray-600 bg-transparent">
                <button onclick="ejecutarBusqueda()"><i class="fas fa-search text-gray-400 hover:text-green-700"></i></button>
            </div>
        </header>

        <div id="category-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            <div class="col-span-full flex flex-col items-center justify-center py-24">
                <div class="w-12 h-12 border-4 border-green-200 border-t-green-700 rounded-full animate-spin"></div>
                <p class="mt-4 text-gray-500 font-medium">Cargando materas...</p>
            </div>
        </div>

        <nav id="pagination-container" class="mt-16 flex justify-center items-center space-x-4"></nav>
    </main>

    <footer class="bg-white border-t border-gray-100 py-10">
        <div class="container mx-auto px-6 flex flex-col md:flex-row justify-between items-center text-gray-400 text-xs">
            <p>© 2026 Grow House | Módulo de Catálogo v2.0</p>
            <div class="flex space-x-6 mt-4 md:mt-0">
                <span>Ingeniería en Sistemas</span>
                <span>Optimización de Recursos</span>
            </div>
        </div>
    </footer>

    <script src="../scripts/config.js"></script>
    <script src="../scripts/productos-api.js"></script>
    <script>
        // Configuración específica de la vista de categoría
        const CATEGORY = 'materas';
        const ITEMS_PER_PAGE = 12;

        async function fetchMateras(page = 1, filter = '') {
            const grid = document.getElementById('category-grid');
            
            try {
                // Endpoint unificado siguiendo la lógica de sistemas
                const url = `${window.GROW_HOUSE_API}/products?category=${CATEGORY}&page=${page}&limit=${ITEMS_PER_PAGE}&search=${encodeURIComponent(filter)}`;
                const response = await fetch(url);
                const result = await response.json();
                
                grid.innerHTML = '';

                if (result.data && result.data.length > 0) {
                    result.data.forEach(item => {
                        // Se delega la creación del componente a productos-api.js para mantener modularidad
                        // Esta función utiliza la IA para renderizar detalles si están disponibles
                        grid.appendChild(createProductCard(item));
                    });
                } else {
                    grid.innerHTML = `
                        <div class="col-span-full text-center py-20">
                            <i class="fas fa-box-open text-4xl text-gray-200 mb-4"></i>
                            <p class="text-gray-400">No hay existencias para este filtro en la categoría materas.</p>
                        </div>`;
                }
            } catch (error) {
                grid.innerHTML = '<p class="col-span-full text-center text-red-500">Error de comunicación con el servicio de inventario.</p>';
                console.error("API Error:", error);
            }
        }

        function ejecutarBusqueda() {
            const term = document.getElementById('search-input').value;
            fetchMateras(1, term);
        }

        // Carga inicial al completar el DOM
        document.addEventListener('DOMContentLoaded', () => fetchMateras(1));
    </script>
</body>
</html>
