<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transforma tu espacio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-principal: #207719;
            --color-hover: #207719;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #ffffff;
            min-height: 100vh;
            padding: 20px;
        }

        .gradient-bg {
            background: linear-gradient(135deg, #2c7611, #317319, #2c7611);
        }

        .glass-effect {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.1);
        }

        .hover-lift {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .hover-lift:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 50px -12px rgba(100, 221, 96, 0.822);
        }

        .category-hover {
            transition: all 0.4s ease;
        }

        .category-hover:hover {
            transform: translateY(-12px) scale(1.02);
            box-shadow: 0 30px 60px rgba(184, 253, 181, 0.63);
        }

        .product-card {
            background: linear-gradient(145deg, #ffffff, #f8fafc);
            border: 1px solid rgba(184, 253, 181, 0.63);
        }

        .product-card:hover {
            border-color: rgba(184, 253, 181, 0.63);
            box-shadow: 0 20px 40px rgba(184, 253, 181, 0.63);
        }

        .price-highlight {
            color: #207939;
            font-weight: 800;
        }

        .texto-verde {
            color: var(--color-principal);
        }

        .texto-verde:hover {
            color: var(--color-hover);
        }

        .bg-verde {
            background-color: var(--color-principal);
        }

        .bg-verde:hover {
            background-color: var(--color-hover);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: var(--color-principal);
            font-size: 2.5rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .header p {
            color: #6b7280;
            font-size: 1.2rem;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        @media (max-width: 968px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(32, 119, 25, 0.15);
            border: 2px solid rgba(184, 253, 181, 0.4);
            padding: 30px;
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 20px;
            color: var(--color-principal);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .btn {
            padding: 15px 20px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #207719, #46d560);
            color: white;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #207719, #46d560);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(4, 111, 26, 0.978);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            color: white;
        }

        .btn-secondary:hover {
            background: linear-gradient(135deg, #1e40af, #2563eb);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(37, 99, 235, 0.3);
        }

        .btn-analyze {
            width: 100%;
            padding: 20px;
            font-size: 1.1rem;
            margin-top: 15px;
        }

        .btn:disabled {
            background: #9ca3af;
            cursor: not-allowed;
            transform: none;
        }

        #preview-container {
            margin-top: 20px;
            position: relative;
        }

        #preview-container img, #camera-preview {
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--color-principal);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            border: 2px dashed #d1d5db;
            border-radius: 12px;
            color: #9ca3af;
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 15px;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .info-box {
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        .info-box-blue {
            background: linear-gradient(135deg, #d1fae5, #a7f3d0);
            border: 2px solid rgba(184, 253, 181, 0.63);
        }

        .info-box-blue h3 {
            color: var(--color-principal);
            margin-bottom: 10px;
        }

        .info-badge {
            display: inline-block;
            background: white;
            padding: 5px 15px;
            border-radius: 20px;
            margin: 5px 5px 5px 0;
            font-size: 0.9rem;
        }

        .planta-card {
            background: linear-gradient(135deg, #f0fdf4, #d1fae5);
            padding: 20px;
            border-radius: 12px;
            border: 2px solid rgba(184, 253, 181, 0.63);
            margin-bottom: 15px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .planta-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 50px -12px rgba(100, 221, 96, 0.822);
        }

        .planta-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }

        .planta-title {
            color: var(--color-principal);
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .planta-scientific {
            color: #207939;
            font-style: italic;
            font-size: 0.9rem;
        }

        .planta-number {
            background: var(--color-principal);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
        }

        .planta-detail {
            margin: 10px 0;
            line-height: 1.6;
        }

        .planta-detail strong {
            color: var(--color-principal);
        }

        .consejos-list {
            list-style: none;
        }

        .consejos-list li {
            background: linear-gradient(135deg, #fed7aa, #fde68a);
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #fbbf24;
            margin-bottom: 10px;
        }

        .combinaciones-box {
            background: linear-gradient(135deg, #fae8ff, #f3e8ff);
            padding: 20px;
            border-radius: 12px;
            border: 2px solid #d8b4fe;
            margin: 15px 0;
        }

        .combinaciones-box h3 {
            color: #7c3aed;
            margin-bottom: 10px;
        }

        #camera-preview {
            display: none;
        }

        .camera-controls {
            position: relative;
        }

        .capture-btn {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            color: var(--color-principal);
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .footer {
            text-align: center;
            color: var(--color-principal);
            margin-top: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #d1fae5, #a7f3d0);
            border: 2px solid rgba(184, 253, 181, 0.63);
            border-radius: 12px;
        }

        .results-container {
            max-height: 600px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .results-container::-webkit-scrollbar {
            width: 8px;
        }

        .results-container::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 4px;
        }

        .results-container::-webkit-scrollbar-thumb {
            background: var(--color-principal);
            border-radius: 4px;
        }

        #file-input {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌿 Transforma tu espacio</h1>
            <p>Dale vida a tu hogar con plantas perfectas para cada esquina.</p>
        </div>

        <div class="main-grid">
            <!-- Panel Izquierdo: Captura -->
            <div class="card">
                <h2 class="card-title">📸 Captura tu Espacio</h2>
                
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="iniciarCamara()">
                        📷 Usar Cámara
                    </button>
                    <button class="btn btn-secondary" onclick="document.getElementById('file-input').click()">
                        📤 Cargar Foto
                    </button>
                </div>

                <input type="file" id="file-input" accept="image/*" onchange="cargarImagen(event)">

                <div id="camera-container" style="display: none;" class="camera-controls">
                    <video id="camera-preview" autoplay playsinline></video>
                    <button class="btn btn-primary capture-btn" onclick="tomarFoto()">
                        📸 Tomar Foto
                    </button>
                </div>

                <div id="preview-container"></div>

                <button id="analyze-btn" class="btn btn-primary btn-analyze" onclick="analizarImagen()" disabled>
                    ✨ Decorar con Plantas
                </button>
            </div>

            <!-- Panel Derecho: Resultados -->
            <div class="card">
                <h2 class="card-title">🌱 Propuesta de Decoración</h2>
                <div id="results-container">
                    <div class="empty-state">
                        <div class="empty-state-icon">🌿</div>
                        <p style="font-size: 1.1rem; margin-bottom: 10px;">Esperando análisis...</p>
                        <p style="font-size: 0.9rem;">La IA sugerirá plantas perfectas para tu espacio</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="footer">
            🌿 <strong>Tip:</strong> Toma fotos desde diferentes ángulos para obtener mejores recomendaciones
        </div>
    </div>

    <canvas id="canvas" style="display: none;"></canvas>

    <script>
        let imagenActual = null;
        let stream = null;

        async function iniciarCamara() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                
                const video = document.getElementById('camera-preview');
                const cameraContainer = document.getElementById('camera-container');
                
                video.srcObject = stream;
                video.style.display = 'block';
                cameraContainer.style.display = 'block';
                
                document.getElementById('preview-container').innerHTML = '';
            } catch (error) {
                alert('No se pudo acceder a la cámara. Intenta cargar una imagen.');
                console.error('Error:', error);
            }
        }

        function tomarFoto() {
            const video = document.getElementById('camera-preview');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            
            imagenActual = canvas.toDataURL('image/jpeg');
            
            // Detener cámara
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            
            document.getElementById('camera-container').style.display = 'none';
            mostrarPreview(imagenActual);
        }

        function cargarImagen(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    imagenActual = e.target.result;
                    mostrarPreview(imagenActual);
                };
                reader.readAsDataURL(file);
            }
        }

        function mostrarPreview(imagenSrc) {
            const container = document.getElementById('preview-container');
            container.innerHTML = `
                <div style="position: relative; margin-top: 20px;">
                    <img src="${imagenSrc}" alt="Vista previa">
                    <div class="badge">✓ Foto Lista</div>
                </div>
            `;
            
            document.getElementById('analyze-btn').disabled = false;
            document.getElementById('results-container').innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">🌿</div>
                    <p style="font-size: 1.1rem;">Presiona "Decorar con Plantas" para analizar</p>
                </div>
            `;
        }

        async function analizarImagen() {
            if (!imagenActual) return;
            
            const btn = document.getElementById('analyze-btn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Analizando espacio...';
            
            const resultsContainer = document.getElementById('results-container');
            resultsContainer.innerHTML = `
                <div class="empty-state">
                    <div class="spinner" style="width: 50px; height: 50px; border-width: 5px;"></div>
                    <p style="margin-top: 20px; font-size: 1.1rem;">Analizando tu espacio...</p>
                </div>
            `;
            
            try {
                const base64Data = imagenActual.split(',')[1];
                
                const response = await fetch("https://api.anthropic.com/v1/messages", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        model: "claude-sonnet-4-20250514",
                        max_tokens: 1000,
                        messages: [{
                            role: "user",
                            content: [
                                {
                                    type: "image",
                                    source: {
                                        type: "base64",
                                        media_type: "image/jpeg",
                                        data: base64Data
                                    }
                                },
                                {
                                    type: "text",
                                    text: `Eres un experto diseñador de interiores especializado en decoración con plantas.

Analiza este espacio y sugiere cómo decorarlo con plantas. Considera:
- La iluminación del espacio (luz natural, artificial, poca luz)
- El tamaño del espacio
- El estilo de decoración existente
- Las superficies disponibles (suelo, mesas, estantes, paredes)

Proporciona recomendaciones específicas de plantas REALES con sus nombres científicos y comunes.

Responde SOLO con un objeto JSON en este formato exacto, sin markdown:
{
  "descripcion_espacio": "descripción breve del espacio",
  "iluminacion": "tipo de iluminación (alta/media/baja)",
  "estilo": "estilo de decoración detectado",
  "plantas_sugeridas": [
    {
      "nombre_comun": "nombre común de la planta",
      "nombre_cientifico": "nombre científico",
      "ubicacion": "dónde colocarla en este espacio específico",
      "cuidados": "cuidados básicos (riego, luz)",
      "beneficios": "beneficios de esta planta"
    }
  ],
  "consejos_decoracion": [
    "consejo 1 específico",
    "consejo 2 específico",
    "consejo 3 específico"
  ],
  "combinaciones": "sugerencia de cómo combinar las plantas"
}`
                                }
                            ]
                        }]
                    })
                });

                const data = await response.json();
                const texto = data.content.map(item => item.type === "text" ? item.text : "").join("");
                const jsonLimpio = texto.replace(/```json|```/g, "").trim();
                const resultado = JSON.parse(jsonLimpio);
                
                mostrarResultados(resultado);
                
            } catch (error) {
                resultsContainer.innerHTML = `
                    <div class="empty-state">
                        <div style="font-size: 3rem;">❌</div>
                        <p style="color: #dc2626; margin-top: 15px;">Error al analizar la imagen</p>
                        <p style="font-size: 0.9rem; margin-top: 10px;">${error.message}</p>
                    </div>
                `;
            }
            
            btn.disabled = false;
            btn.innerHTML = '✨ Decorar con Plantas';
        }

        function mostrarResultados(r) {
            const html = `
                <div class="results-container">
                    <div class="info-box info-box-blue">
                        <h3>☀️ Análisis del Espacio</h3>
                        <p style="margin-bottom: 10px;">${r.descripcion_espacio}</p>
                        <span class="info-badge">💡 Luz: ${r.iluminacion}</span>
                        <span class="info-badge">🎨 ${r.estilo}</span>
                    </div>

                    <h3 style="margin: 20px 0 15px 0; color: var(--color-principal); font-size: 1.2rem;">🌿 Plantas Recomendadas</h3>
                    ${r.plantas_sugeridas.map((p, i) => `
                        <div class="planta-card">
                            <div class="planta-header">
                                <div>
                                    <div class="planta-title">${p.nombre_comun}</div>
                                    <div class="planta-scientific">${p.nombre_cientifico}</div>
                                </div>
                                <span class="planta-number">#${i + 1}</span>
                            </div>
                            <div class="planta-detail"><strong>📍 Ubicación:</strong> ${p.ubicacion}</div>
                            <div class="planta-detail"><strong>💧 Cuidados:</strong> ${p.cuidados}</div>
                            <div class="planta-detail"><strong>✨ Beneficios:</strong> ${p.beneficios}</div>
                        </div>
                    `).join('')}

                    <div class="combinaciones-box">
                        <h3>🌬️ Cómo Combinarlas</h3>
                        <p>${r.combinaciones}</p>
                    </div>

                    <h3 style="margin: 20px 0 15px 0; color: #ea580c; font-size: 1.2rem;">💡 Consejos de Decoración</h3>
                    <ul class="consejos-list">
                        ${r.consejos_decoracion.map((c, i) => `
                            <li><strong style="color: #c2410c;">${i + 1}.</strong> ${c}</li>
                        `).join('')}
                    </ul>
                </div>
            `;
            
            document.getElementById('results-container').innerHTML = html;
        }
    </script>
</body>
</html>
