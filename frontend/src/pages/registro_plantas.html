<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Plantas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-principal: #207719;
            --color-hover: #207719;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #ffffff;
            min-height: 100vh;
            padding: 20px;
        }

        .gradient-bg {
            background: linear-gradient(135deg, #2c7611, #317319, #2c7611);
        }

        .glass-effect {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.1);
        }

        .hover-lift {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .hover-lift:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 50px -12px rgba(100, 221, 96, 0.822);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: var(--color-principal);
            font-size: 2.8rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .header p {
            color: #6b7280;
            font-size: 1.2rem;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #ffffff, #f0fdf4);
            border: 2px solid rgba(184, 253, 181, 0.4);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(32, 119, 25, 0.1);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(32, 119, 25, 0.2);
        }

        .stat-card .number {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--color-principal);
        }

        .stat-card .label {
            color: #6b7280;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        @media (max-width: 968px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(32, 119, 25, 0.15);
            border: 2px solid rgba(184, 253, 181, 0.4);
            padding: 30px;
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 20px;
            color: var(--color-principal);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .btn {
            padding: 15px 20px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #207719, #46d560);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(4, 111, 26, 0.4);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            color: white;
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(37, 99, 235, 0.3);
        }

        .btn-analyze {
            width: 100%;
            padding: 18px;
            font-size: 1.1rem;
            margin-top: 15px;
        }

        .btn:disabled {
            background: #9ca3af;
            cursor: not-allowed;
            transform: none;
        }

        #preview-container img, #camera-preview {
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            margin-top: 15px;
        }

        .badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--color-principal);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            border: 2px dashed #d1d5db;
            border-radius: 12px;
            color: #9ca3af;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .analysis-result {
            display: none;
        }

        .analysis-result.active {
            display: block;
        }

        .info-section {
            background: linear-gradient(135deg, #f0fdf4, #dcfce7);
            padding: 20px;
            border-radius: 12px;
            border: 2px solid rgba(184, 253, 181, 0.63);
            margin-bottom: 15px;
        }

        .info-section h3 {
            color: var(--color-principal);
            margin-bottom: 10px;
            font-size: 1.3rem;
        }

        .scientific-name {
            color: #207939;
            font-style: italic;
            font-size: 0.95rem;
            margin-bottom: 15px;
        }

        .care-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin-top: 15px;
        }

        .care-item {
            background: white;
            padding: 12px;
            border-radius: 8px;
            border-left: 4px solid var(--color-principal);
        }

        .care-item .icon {
            font-size: 1.2rem;
            margin-right: 8px;
        }

        .care-item strong {
            color: var(--color-principal);
            display: block;
            margin-bottom: 5px;
        }

        .recommendations-list {
            list-style: none;
            padding: 0;
        }

        .recommendations-list li {
            background: white;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 8px;
            border-left: 4px solid #fbbf24;
        }

        .recommendations-list li:before {
            content: "✓ ";
            color: var(--color-principal);
            font-weight: bold;
            margin-right: 8px;
        }

        .btn-save {
            background: linear-gradient(135deg, #207719, #46d560);
            width: 100%;
            padding: 18px;
            margin-top: 20px;
        }

        .btn-save:hover {
            background: linear-gradient(135deg, #1a5f13, #207719);
        }

        .my-plants-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .plant-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(32, 119, 25, 0.1);
            border: 2px solid rgba(184, 253, 181, 0.4);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .plant-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(32, 119, 25, 0.2);
        }

        .plant-card-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .plant-card-content {
            padding: 15px;
        }

        .plant-card-title {
            color: var(--color-principal);
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .plant-card-date {
            color: #9ca3af;
            font-size: 0.85rem;
            margin-bottom: 10px;
        }

        .plant-card-quick-info {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .plant-tag {
            background: #d1fae5;
            color: var(--color-principal);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
        }

        .btn-delete {
            background: #ef4444;
            color: white;
            padding: 8px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }

        .btn-delete:hover {
            background: #dc2626;
        }

        #camera-preview {
            display: none;
        }

        .camera-controls {
            position: relative;
        }

        .capture-btn {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            color: var(--color-principal);
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        #file-input {
            display: none;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            padding: 20px;
            overflow-y: auto;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            font-size: 1.2rem;
            cursor: pointer;
        }

        .modal-close:hover {
            background: #dc2626;
        }

        .modal-image {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌿 Mi Jardín Digital</h1>
            <p>Registra, analiza y cuida tus plantas con IA</p>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="number" id="total-plantas">0</div>
                <div class="label">Plantas Registradas</div>
            </div>
            <div class="stat-card">
                <div class="number" id="ultima-agregada">-</div>
                <div class="label">Última Agregada</div>
            </div>
        </div>

        <div class="main-grid">
            <!-- Panel Izquierdo: Agregar Nueva Planta -->
            <div class="card">
                <h2 class="card-title">📸 Agregar Nueva Planta</h2>
                
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="iniciarCamara()">
                        📷 Tomar Foto
                    </button>
                    <button class="btn btn-secondary" onclick="document.getElementById('file-input').click()">
                        📤 Cargar Foto
                    </button>
                </div>

                <input type="file" id="file-input" accept="image/*" onchange="cargarImagen(event)">

                <div id="camera-container" style="display: none;" class="camera-controls">
                    <video id="camera-preview" autoplay playsinline></video>
                    <button class="btn btn-primary capture-btn" onclick="tomarFoto()">
                        📸 Capturar
                    </button>
                </div>

                <div id="preview-container"></div>

                <button id="analyze-btn" class="btn btn-primary btn-analyze" onclick="analizarPlanta()" disabled>
                    🔍 Analizar Planta con IA
                </button>

                <!-- Resultados del análisis -->
                <div id="analysis-result" class="analysis-result"></div>
            </div>

            <!-- Panel Derecho: Mis Plantas -->
            <div class="card">
                <h2 class="card-title">🪴 Mis Plantas</h2>
                <div id="my-plants-container">
                    <div class="empty-state">
                        <div style="font-size: 4rem; margin-bottom: 15px;">🌱</div>
                        <p style="font-size: 1.1rem;">Aún no has registrado plantas</p>
                        <p style="font-size: 0.9rem; margin-top: 10px;">Toma o carga una foto para comenzar</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal para ver detalles de planta -->
    <div id="plant-modal" class="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="cerrarModal()">×</button>
            <div id="modal-content"></div>
        </div>
    </div>

    <canvas id="canvas" style="display: none;"></canvas>

    <script>
        let imagenActual = null;
        let stream = null;
        let plantas = [];
        let analisisActual = null;

        // Cargar plantas desde el almacenamiento persistente
        async function cargarPlantas() {
            try {
                const keys = await window.storage.list('planta:');
                if (keys && keys.keys) {
                    const plantasPromises = keys.keys.map(async key => {
                        const result = await window.storage.get(key);
                        return result ? JSON.parse(result.value) : null;
                    });
                    plantas = (await Promise.all(plantasPromises)).filter(p => p !== null);
                }
            } catch (error) {
                console.log('No hay plantas guardadas aún');
                plantas = [];
            }
        }

        function actualizarEstadisticas() {
            document.getElementById('total-plantas').textContent = plantas.length;
            if (plantas.length > 0) {
                const ultima = plantas[plantas.length - 1];
                document.getElementById('ultima-agregada').textContent = ultima.nombre_comun;
            }
        }

        async function iniciarCamara() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                
                const video = document.getElementById('camera-preview');
                const cameraContainer = document.getElementById('camera-container');
                
                video.srcObject = stream;
                video.style.display = 'block';
                cameraContainer.style.display = 'block';
                
                document.getElementById('preview-container').innerHTML = '';
                document.getElementById('analysis-result').classList.remove('active');
            } catch (error) {
                alert('No se pudo acceder a la cámara. Intenta cargar una imagen.');
                console.error('Error:', error);
            }
        }

        function tomarFoto() {
            const video = document.getElementById('camera-preview');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            
            imagenActual = canvas.toDataURL('image/jpeg');
            
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            
            document.getElementById('camera-container').style.display = 'none';
            mostrarPreview(imagenActual);
        }

        function cargarImagen(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    imagenActual = e.target.result;
                    mostrarPreview(imagenActual);
                };
                reader.readAsDataURL(file);
            }
        }

        function mostrarPreview(imagenSrc) {
            const container = document.getElementById('preview-container');
            container.innerHTML = `
                <div style="position: relative; margin-top: 20px;">
                    <img src="${imagenSrc}" alt="Vista previa">
                    <div class="badge">✓ Foto Lista</div>
                </div>
            `;
            
            document.getElementById('analyze-btn').disabled = false;
            document.getElementById('analysis-result').classList.remove('active');
        }

        async function analizarPlanta() {
            if (!imagenActual) return;
            
            const btn = document.getElementById('analyze-btn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Analizando planta...';
            
            try {
                const base64Data = imagenActual.split(',')[1];
                
                const response = await fetch("https://api.anthropic.com/v1/messages", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        model: "claude-sonnet-4-20250514",
                        max_tokens: 1500,
                        messages: [{
                            role: "user",
                            content: [
                                {
                                    type: "image",
                                    source: {
                                        type: "base64",
                                        media_type: "image/jpeg",
                                        data: base64Data
                                    }
                                },
                                {
                                    type: "text",
                                    text: `Analiza esta planta en detalle y proporciona información completa para su registro y cuidado.

Responde SOLO con un objeto JSON en este formato exacto, sin markdown:
{
  "nombre_comun": "nombre común de la planta",
  "nombre_cientifico": "nombre científico completo",
  "familia": "familia botánica",
  "descripcion": "descripción detallada de la planta, sus características visibles",
  "origen": "región de origen",
  "cuidados": {
    "riego": "frecuencia y cantidad de riego",
    "luz": "necesidades de luz detalladas",
    "temperatura": "rango de temperatura ideal",
    "humedad": "nivel de humedad necesario",
    "fertilizacion": "frecuencia y tipo de fertilizante",
    "poda": "cuándo y cómo podar"
  },
  "problemas_comunes": [
    "problema 1 y solución",
    "problema 2 y solución",
    "problema 3 y solución"
  ],
  "recomendaciones": [
    "recomendación 1 específica",
    "recomendación 2 específica",
    "recomendación 3 específica"
  ],
  "nivel_dificultad": "fácil/moderada/difícil",
  "toxicidad": "información sobre toxicidad para humanos/mascotas",
  "propagacion": "métodos de propagación",
  "tamano_esperado": "tamaño que alcanzará"
}`
                                }
                            ]
                        }]
                    })
                });

                const data = await response.json();
                const texto = data.content.map(item => item.type === "text" ? item.text : "").join("");
                const jsonLimpio = texto.replace(/```json|```/g, "").trim();
                const resultado = JSON.parse(jsonLimpio);
                
                analisisActual = resultado;
                mostrarAnalisis(resultado);
                
            } catch (error) {
                alert('Error al analizar la planta. Intenta de nuevo.');
                console.error('Error:', error);
            }
            
            btn.disabled = false;
            btn.innerHTML = '🔍 Analizar Planta con IA';
        }

        function mostrarAnalisis(data) {
            const container = document.getElementById('analysis-result');
            container.className = 'analysis-result active';
            
            container.innerHTML = `
                <div style="margin-top: 30px;">
                    <div class="info-section">
                        <h3>${data.nombre_comun}</h3>
                        <div class="scientific-name">${data.nombre_cientifico}</div>
                        <p><strong>Familia:</strong> ${data.familia}</p>
                        <p><strong>Origen:</strong> ${data.origen}</p>
                        <p style="margin-top: 10px;">${data.descripcion}</p>
                    </div>

                    <div class="info-section">
                        <h3>💧 Cuidados Necesarios</h3>
                        <div class="care-grid">
                            <div class="care-item">
                                <span class="icon">💧</span>
                                <strong>Riego</strong>
                                <span style="font-size: 0.9rem; color: #4b5563;">${data.cuidados.riego}</span>
                            </div>
                            <div class="care-item">
                                <span class="icon">☀️</span>
                                <strong>Luz</strong>
                                <span style="font-size: 0.9rem; color: #4b5563;">${data.cuidados.luz}</span>
                            </div>
                            <div class="care-item">
                                <span class="icon">🌡️</span>
                                <strong>Temperatura</strong>
                                <span style="font-size: 0.9rem; color: #4b5563;">${data.cuidados.temperatura}</span>
                            </div>
                            <div class="care-item">
                                <span class="icon">💨</span>
                                <strong>Humedad</strong>
                                <span style="font-size: 0.9rem; color: #4b5563;">${data.cuidados.humedad}</span>
                            </div>
                            <div class="care-item">
                                <span class="icon">🌱</span>
                                <strong>Fertilización</strong>
                                <span style="font-size: 0.9rem; color: #4b5563;">${data.cuidados.fertilizacion}</span>
                            </div>
                            <div class="care-item">
                                <span class="icon">✂️</span>
                                <strong>Poda</strong>
                                <span style="font-size: 0.9rem; color: #4b5563;">${data.cuidados.poda}</span>
                            </div>
                        </div>
                    </div>

                    <div class="info-section" style="background: linear-gradient(135deg, #fef3c7, #fde68a); border-color: #fbbf24;">
                        <h3 style="color: #92400e;">💡 Recomendaciones</h3>
                        <ul class="recommendations-list">
                            ${data.recomendaciones.map(rec => `<li>${rec}</li>`).join('')}
                        </ul>
                    </div>

                    <div class="info-section" style="background: linear-gradient(135deg, #fee2e2, #fecaca); border-color: #fca5a5;">
                        <h3 style="color: #991b1b;">⚠️ Problemas Comunes</h3>
                        <ul class="recommendations-list">
                            ${data.problemas_comunes.map(prob => `<li style="border-color: #ef4444;">${prob}</li>`).join('')}
                        </ul>
                    </div>

                    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px;">
                        <div class="care-item">
                            <strong>Dificultad</strong>
                            <span style="font-size: 0.9rem; color: #4b5563;">${data.nivel_dificultad}</span>
                        </div>
                        <div class="care-item">
                            <strong>Tamaño</strong>
                            <span style="font-size: 0.9rem; color: #4b5563;">${data.tamano_esperado}</span>
                        </div>
                        <div class="care-item">
                            <strong>Propagación</strong>
                            <span style="font-size: 0.9rem; color: #4b5563;">${data.propagacion}</span>
                        </div>
                    </div>

                    <div class="info-section" style="background: linear-gradient(135deg, #e0e7ff, #c7d2fe); border-color: #a5b4fc;">
                        <h3 style="color: #3730a3;">🐾 Toxicidad</h3>
                        <p style="color: #4338ca;">${data.toxicidad}</p>
                    </div>

                    <button class="btn btn-primary btn-save" onclick="guardarPlanta()">
                        💾 Guardar en Mi Jardín
                    </button>
                </div>
            `;
        }

        async function guardarPlanta() {
            if (!analisisActual || !imagenActual) return;
            
            const id = Date.now();
            const planta = {
                ...analisisActual,
                imagen: imagenActual,
                fecha: new Date().toISOString(),
                id: id
            };
            
            try {
                await window.storage.set(`planta:${id}`, JSON.stringify(planta));
                plantas.push(planta);
                
                await mostrarMisPlantas();
                actualizarEstadisticas();
                
                // Limpiar formulario
                document.getElementById('preview-container').innerHTML = '';
                document.getElementById('analysis-result').innerHTML = '';
                document.getElementById('analysis-result').classList.remove('active');
                document.getElementById('analyze-btn').disabled = true;
                imagenActual = null;
                analisisActual = null;
                
                alert('¡Planta guardada exitosamente! 🌿');
            } catch (error) {
                console.error('Error al guardar:', error);
                alert('Error al guardar la planta. Intenta de nuevo.');
            }
        }

        async function mostrarMisPlantas() {
            const container = document.getElementById('my-plants-container');
            
            if (plantas.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div style="font-size: 4rem; margin-bottom: 15px;">🌱</div>
                        <p style="font-size: 1.1rem;">Aún no has registrado plantas</p>
                        <p style="font-size: 0.9rem; margin-top: 10px;">Toma o carga una foto para comenzar</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = `
                <div class="my-plants-grid">
                    ${plantas.map(planta => `
                        <div class="plant-card" onclick="verDetallesPlanta(${planta.id})">
                            <img src="${planta.imagen}" alt="${planta.nombre_comun}" class="plant-card-image">
                            <div class="plant-card-content">
                                <div class="plant-card-title">${planta.nombre_comun}</div>
                                <div class="plant-card-date">${new Date(planta.fecha).toLocaleDateString()}</div>
                                <div class="plant-card-quick-info">
                                    <span class="plant-tag">${planta.nivel_dificultad}</span>
                                    <span class="plant-tag">${planta.familia}</span>
                                </div>
                                <button class="btn-delete" onclick="event.stopPropagation(); eliminarPlanta(${planta.id})">
                                    🗑️ Eliminar
                                </button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function verDetallesPlanta(id) {
            const planta = plantas.find(p => p.id === id);
            if (!planta) return;
            
            const modal = document.getElementById('plant-modal');
            const content = document.getElementById('modal-content');
            
            content.innerHTML = `
                <img src="${planta.imagen}" alt="${planta.nombre_comun}" class="modal-image">
                <h2 style="color: #047857; margin-bottom: 10px;">${planta.nombre_comun}</h2>
                <p style="font-style: italic; color: #059669; margin-bottom: 20px;">${planta.nombre_cientifico}</p>
                <p style="margin-bottom: 20px;"><strong>Registrada:</strong> ${new Date(planta.fecha).toLocaleDateString()}</p>
                
                <div style="background: #f0fdf4; padding: 15px; border-radius: 10px; margin-bottom: 15px;">
                    <h4 style="color: #047857; margin-bottom: 10px;">Cuidados Rápidos:</h4>
                    <p><strong>💧 Riego:</strong> ${planta.cuidados.riego}</p>
                    <p><strong>☀️ Luz:</strong> ${planta.cuidados.luz}</p>
                    <p><strong>🌡️ Temperatura:</strong> ${planta.cuidados.temperatura}</p>
                </div>
            `;
            
            modal.classList.add('active');
        }

        function cerrarModal() {
            document.getElementById('plant-modal').classList.remove('active');
        }

        function eliminarPlanta(id) {
            if (confirm('¿Estás seguro de eliminar esta planta?')) {
                plantas = plantas.filter(p => p.id !== id);
                localStorage.setItem('misplantas', JSON.stringify(plantas));
                mostrarMisPlantas();
                actualizarEstadisticas();
            }
        }

        // Inicializar
        window.onload = function() {
            mostrarMisPlantas();
            actualizarEstadisticas();
        };

        // Cerrar modal al hacer click fuera
        document.getElementById('plant-modal').addEventListener('click', function(e) {
            if (e.target === this) {
                cerrarModal();
            }
        });
    </script>
</body>
</html>
